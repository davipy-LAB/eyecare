<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyecare - Dashboard</title>
    <link rel="stylesheet" href="static/css/onboarding.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div class="hero-copy">
                <p class="eyecare-tag">Eyecare</p>
                <h1>Dashboard</h1>
                <p class="hero-description">Bem-vindo ao seu painel de controle de acessibilidade visual.</p>
            </div>
            <div class="hero-actions">
                <button id="reset-onboarding" class="btn btn-secondary">Reiniciar Onboarding</button>
            </div>
        </header>

        <main class="content">
            <section class="card">
                <h2>Configurações Atuais</h2>
                <p>Idioma: <span id="current-lang">Português</span></p>
                <p>Tipo de Daltonismo: <span id="current-type">Nenhum</span></p>
                <p>Filtro Aplicado: <span id="current-filter">Nenhum</span></p>
            </section>
        </main>
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" class="sr-only" aria-hidden="true" style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="protanopia-filter">
                <feColorMatrix type="matrix" values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0"/>
            </filter>
            <filter id="deuteranopia-filter">
                <feColorMatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0"/>
            </filter>
            <filter id="tritanopia-filter">
                <feColorMatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0"/>
            </filter>
        </defs>
    </svg>

    <script src="static/js/dashboard.js"></script>
</body>
</html>
